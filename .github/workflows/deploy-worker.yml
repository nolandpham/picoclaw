name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - release/production
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    environment: Cloudflare Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --name picoclaw-worker

      - name: Smoke test health endpoint
        env:
          WORKER_HEALTH_URL: ${{ secrets.WORKER_HEALTH_URL }}
        run: |
          if [ -z "$WORKER_HEALTH_URL" ]; then
            echo "WORKER_HEALTH_URL is not set; skipping smoke test"
            exit 0
          fi
          echo "Smoke testing: $WORKER_HEALTH_URL"
          curl -fsS "$WORKER_HEALTH_URL" | tee /tmp/worker-health.json
